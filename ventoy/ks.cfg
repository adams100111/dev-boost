# ks.cfg — dev-boost zero-touch Fedora 44 Kickstart (design §9.6 + §10c BTRFS layout).
# Fed to the Fedora netinst ISO by Ventoy auto_install. Installs unattended with a
# snapshot-ready BTRFS subvolume layout, then a first-boot oneshot runs `devboost install full`.

text
lang en_US.UTF-8
keyboard us
timezone --utc Etc/UTC
rootpw --lock
firstboot --disable
reboot

# --- Disk detection: %pre writes /tmp/diskdetect.ks, sourced below via %include ---------------
# This replaces the former hardcoded `ignoredisk --only-use=sda` (which failed on NVMe/vda).
# The %include is processed AFTER %pre completes — this is standard Anaconda behaviour.
%pre --log=/tmp/devboost-ks-pre.log
#!/bin/sh
# Pick the install target: the first REAL, non-removable disk that is not the boot media.
#
# "Real" is the load-bearing word. Fedora's installer runs zram for compressed swap, and
# /dev/zram0 is TYPE=disk with RM=0 — lsblk cannot tell it from an internal disk. Taking it
# emitted `ignoredisk --only-use=zram0`, and Anaconda terminated before installing anything:
#     Disk "zram0" given in ignoredisk command does not exist.
# It depends on enumeration order, so it hides wherever sda/nvme0n1 happens to sort first.
#
# The test is sysfs, not name matching: virtual block devices (zram, loop, device-mapper,
# md) have no <sysfs>/<name>/device symlink; real hardware (sda, nvme0n1, vda) does.
#
# DEVBOOST_SYSBLOCK/DEVBOOST_KS_OUT/DEVBOOST_CMDLINE exist so tests/media/test_kickstart_pre.py
# can run this exact script against a faked lsblk, sysfs, and /proc/cmdline. Anaconda leaves
# them unset (the cmdline default is the real kernel command line).
SYSBLOCK=${DEVBOOST_SYSBLOCK:-/sys/block}
KS_OUT=${DEVBOOST_KS_OUT:-/tmp/diskdetect.ks}
CMDLINE=${DEVBOOST_CMDLINE-$(cat /proc/cmdline 2>/dev/null || true)}

# refuse MESSAGE — emit a sentinel ignoredisk so Anaconda terminates with a message naming
# dev-boost, rather than running the `part`/`clearpart` directives below against a guess.
refuse() {
    echo "[pre] FATAL: $1" >&2
    echo "[pre] block devices seen:" >&2
    lsblk -dpno NAME,TYPE,RM >&2 2>/dev/null || true
    printf '# devboost refused: %s — see /tmp/devboost-ks-pre.log\nignoredisk --only-use=devboost-%s\n' \
        "$1" "no-usable-target-disk" > "$KS_OUT"
    exit 0
}

# An operator can name the target explicitly via a `devboost.disk=<name>` kernel arg (edit the
# boot entry in the Ventoy menu). This is REQUIRED to disambiguate a machine with two internal
# disks; on a single-disk box it is optional but, if given, must match.
WANT=""
for tok in $CMDLINE; do
    case "$tok" in devboost.disk=*) WANT=${tok#devboost.disk=} ;; esac
done

# Never target the disk we booted from. A USB reporting RM=0 (USB SSDs, some enclosures)
# would otherwise be erased out from under the running installer. VTOYEFI is Ventoy's ESP
# label and is fixed by Ventoy — unlike the data partition's label, it is not -L settable.
BOOTDISK=""
VTOYEFI=$(blkid -L VTOYEFI 2>/dev/null || true)
if [ -n "$VTOYEFI" ]; then
    BOOTDISK=$(lsblk -pno PKNAME "$VTOYEFI" 2>/dev/null | head -1)
fi

# Collect ALL real, non-removable, non-boot disks — do not stop at the first. Enumeration
# order is not stable, so silently taking the first of several would wipe an unpredictable
# disk on a multi-disk workstation.
CANDS=""
for CAND in $(lsblk -dpno NAME,TYPE,RM 2>/dev/null | awk '$2=="disk" && $3=="0" {print $1}'); do
    NAME=${CAND##*/}
    if [ ! -e "$SYSBLOCK/$NAME/device" ]; then
        echo "[pre] skip $CAND — virtual block device (zram/loop/dm), not installable" >&2
        continue
    fi
    if [ -n "$BOOTDISK" ] && [ "$NAME" = "${BOOTDISK##*/}" ]; then
        echo "[pre] skip $CAND — this is the dev-boost install media" >&2
        continue
    fi
    CANDS="$CANDS $NAME"
done
CANDS=${CANDS# }

NCAND=$(echo $CANDS | wc -w)
if [ -n "$WANT" ]; then
    # An explicit choice must resolve to exactly one candidate — never fall back on mismatch.
    MATCH=""
    for c in $CANDS; do [ "$c" = "$WANT" ] && MATCH="$c"; done
    [ -n "$MATCH" ] || refuse "devboost.disk=$WANT is not an installable target (candidates: ${CANDS:-none})"
    DISKNAME="$MATCH"
elif [ "$NCAND" -eq 0 ]; then
    refuse "no usable target disk — no real, non-removable, non-boot disk found"
elif [ "$NCAND" -gt 1 ]; then
    refuse "more than one candidate disk ($CANDS) — ambiguous; name one with a devboost.disk=<name> kernel arg"
else
    DISKNAME="$CANDS"
fi

DISK="/dev/$DISKNAME"
echo "[pre] target disk → $DISK (DISKNAME=$DISKNAME)" >&2

cat > "$KS_OUT" <<EOF
# Auto-detected target disk: $DISK
ignoredisk --only-use=$DISKNAME
clearpart --all --initlabel --drives=$DISKNAME
EOF
%end

# --- Disk / partitioning: §10c BTRFS subvolume layout ----------------------------------------
# Disk selection is dynamic (see %pre above). /boot stays INSIDE the root subvolume so that a
# snapper rollback atomically includes the matching kernel + initramfs.
# No swap partition — zram-generator provides memory compression at runtime.
%include /tmp/diskdetect.ks

# Boot on BOTH firmwares. Omit --location: Anaconda auto-selects grub2-efi (UEFI, via the ESP)
# or grub2-pc (BIOS, via the biosboot partition). Formerly `--location=mbr`, wrong on UEFI.
bootloader --timeout=3

# biosboot is REQUIRED to boot a GPT disk on a BIOS/legacy machine — GRUB embeds its core
# image there. Without it Anaconda refuses a BIOS install ("needs a special partition to boot
# from a GPT disk label ... Kickstart insufficient") and drops to an interactive prompt, which
# hangs an unattended install. 1 MiB, and simply unused on UEFI (where the ESP boots). Real
# targets are UEFI, but a machine with CSM/legacy enabled would otherwise stall forever.
part biosboot    --fstype=biosboot --size=1
part /boot/efi   --fstype=efi      --size=600 --label=ESP
part btrfs.01    --grow            --size=1024

btrfs none --label=fedora btrfs.01

# NOTE on compression: the `btrfs` command takes NO --fsoptions. Its options are
# --noformat --useexisting --label --data --metadata --subvol --parent --name --mkfsoptions
# (--fsoptions belongs to `part`/`logvol`). Passing it made Anaconda 44.30 refuse the whole
# file — "Unexpected arguments to btrfs command" — and terminate before installing anything,
# so zero-touch had never once worked. compress=zstd:1 is a MOUNT option, applied to
# /etc/fstab by the %post below.

# snapper-managed subvolumes
btrfs /        --subvol --name=root           fedora
btrfs /home    --subvol --name=home           fedora

# MANDATORY writable subvolume — without it, booting a read-only snapshot fails at the GDM login.
btrfs /var/lib/gdm        --subvol --name=var-lib-gdm        fedora

# non-snapshotted high-churn subvolumes
btrfs /opt                --subvol --name=opt                fedora
btrfs /var/cache          --subvol --name=var-cache          fedora
btrfs /var/log            --subvol --name=var-log            fedora
btrfs /var/spool          --subvol --name=var-spool          fedora
btrfs /var/tmp            --subvol --name=var-tmp            fedora
btrfs /var/lib/containers --subvol --name=var-lib-containers fedora
btrfs /var/lib/flatpak    --subvol --name=var-lib-flatpak    fedora
btrfs /var/lib/libvirt    --subvol --name=var-lib-libvirt    fedora
# NOTE: no `part swap` / no swap subvolume — zram only (provided by zram-generator).

# --- Minimal package set: engine runtime; full desktop installed by devboost -----------------
%packages
@^workstation-product-environment
git
python3
jq
%end

# --- %post --nochroot: stage binary + secrets from installer overlay into target system ------
#
# DATA-FLOW OVERVIEW
# ──────────────────
# USB build time:
#   The dev-boost USB builder places two things on the VTOY data partition:
#     VTOY:/Bootstrap/secrets.age     — age-encrypted secrets bundle
#     VTOY:/Bootstrap/age-key.txt     — age decryption key
#   ventoy.json's "injection" key unpacks devboost.tar.gz (which contains /opt/dev-boost/devboost)
#   into the Anaconda INSTALLER's initrd overlay at boot time — i.e., the binary lives at
#   /opt/dev-boost/devboost in the running installer, NOT on the target disk.
#
# Install time (this block):
#   %post --nochroot runs with / = installer overlay, /mnt/sysimage = target installed disk.
#   This is the only moment both namespaces are simultaneously accessible, so we bridge the gap:
#     /opt/dev-boost/devboost       (installer overlay)  →  /mnt/sysimage/opt/dev-boost/devboost
#     VTOY:/Bootstrap/secrets.age   (USB partition)      →  /mnt/sysimage/opt/dev-boost/secrets.age
#     VTOY:/Bootstrap/age-key.txt   (USB partition)      →  /mnt/sysimage/opt/dev-boost/age-key.txt
#
# First boot:
#   devboost-firstboot.service finds /opt/dev-boost/devboost (ConditionPathExists passes),
#   reads secrets from $DEVBOOST_SECRETS and the key from $DEVBOOST_SECRETS_KEY, and runs
#   `devboost install full`.
%post --nochroot --log=/tmp/devboost-ks-nochroot.log
#!/bin/sh
set -e

DEST=/mnt/sysimage/opt/dev-boost
mkdir -p "$DEST"

# 1. Copy the injected binary from the installer overlay to the target system.
if [ -f /opt/dev-boost/devboost ]; then
    cp /opt/dev-boost/devboost "$DEST/devboost"
    chmod 0755 "$DEST/devboost"
    echo "[nochroot] binary staged → $DEST/devboost"
else
    echo "[nochroot] WARNING: /opt/dev-boost/devboost not found in installer overlay" >&2
    echo "[nochroot]   Ventoy injection may not have run; firstboot service will be a no-op." >&2
fi

# 2. Locate Ventoy's data partition by label and copy Bootstrap secrets into the target.
#    Contract (media agent): secrets.age + age-key.txt live at <data partition>:/Bootstrap/.
#    The label is "Ventoy" (VentoyWorker.sh: VTNEW_LABEL='Ventoy' -> mkexfatfs -n). It is NOT
#    "VTOY" — that string appears nowhere on a Ventoy disk, so `blkid -L VTOY` always
#    returned empty and this whole block silently skipped: --secrets never reached the
#    target. The same wrong constant was fixed in probe.py/stages.py; this bash copy is why
#    the fix has to live in one place (devboost.media.devices.VTOY_DATA_LABEL).
VTOY_DEV=$(blkid -L Ventoy 2>/dev/null || true)
if [ -n "$VTOY_DEV" ]; then
    VTOY_MNT=$(mktemp -d /tmp/vtoy-XXXXXX)
    if mount -o ro "$VTOY_DEV" "$VTOY_MNT" 2>/dev/null; then
        BOOTSTRAP="$VTOY_MNT/Bootstrap"
        STAGED=0
        for f in secrets.age age-key.txt; do
            if [ -f "$BOOTSTRAP/$f" ]; then
                cp "$BOOTSTRAP/$f" "$DEST/$f"
                chmod 0600 "$DEST/$f"
                echo "[nochroot] $f staged → $DEST/$f"
                STAGED=$((STAGED + 1))
            else
                echo "[nochroot] WARNING: $BOOTSTRAP/$f not found — secrets may be incomplete" >&2
            fi
        done
        umount "$VTOY_MNT"
        echo "[nochroot] VTOY unmounted; $STAGED secret file(s) staged"
    else
        echo "[nochroot] WARNING: could not mount $VTOY_DEV read-only — secrets not staged" >&2
    fi
    rmdir "$VTOY_MNT" 2>/dev/null || true
else
    echo "[nochroot] WARNING: no Ventoy-labelled partition found (blkid -L Ventoy was empty)" >&2
    echo "[nochroot]   secrets.age + age-key.txt NOT staged; credential chain will fail on firstboot." >&2
fi

# Preserve this log on the installed system so post-install diagnostics can read it.
mkdir -p /mnt/sysimage/var/log
cp /tmp/devboost-ks-nochroot.log /mnt/sysimage/var/log/devboost-ks-nochroot.log 2>/dev/null || true
%end

# --- %post (chrooted): btrfs compression + the self-disabling firstboot service --------------
%post --log=/var/log/devboost-ks-post.log

# compress=zstd:1 on every btrfs mount. It belongs here because it is a MOUNT option and the
# `btrfs` kickstart command cannot express one (it has --mkfsoptions, for mkfs, and no
# --fsoptions). Idempotent, and a no-op on any entry Anaconda already compressed.
if [ -f /etc/fstab ]; then
    awk '
        # btrfs data lines only: skip comments/blanks, and leave a present compress= alone.
        $1 !~ /^#/ && NF >= 4 && $3 == "btrfs" && $4 !~ /compress=/ { $4 = $4 ",compress=zstd:1" }
        { print }
    ' OFS='\t' /etc/fstab > /etc/fstab.devboost && mv /etc/fstab.devboost /etc/fstab
    echo "[post] btrfs mounts set to compress=zstd:1:"
    grep -c 'compress=zstd:1' /etc/fstab || true
fi

mkdir -p /opt/dev-boost
cat > /etc/systemd/system/devboost-firstboot.service <<'UNIT'
[Unit]
Description=dev-boost first-boot bootstrap (devboost install full)
After=network-online.target
Wants=network-online.target
ConditionPathExists=/opt/dev-boost/devboost

[Service]
Type=oneshot
RemainAfterExit=yes
# All three vars are required by the secrets module (CONTRACT: secrets.py reads
# DEVBOOST_BOOTSTRAP_DIR and must NOT fall back to ".").
Environment=DEVBOOST_BOOTSTRAP_DIR=/opt/dev-boost
Environment=DEVBOOST_SECRETS=/opt/dev-boost/secrets.age
Environment=DEVBOOST_SECRETS_KEY=/opt/dev-boost/age-key.txt
# Run the provisioning binary directly; redirect output to a persistent log.
ExecStart=/opt/dev-boost/devboost install full
StandardOutput=append:/var/log/devboost-firstboot.log
StandardError=append:/var/log/devboost-firstboot.log
# Self-disable ONLY on success (exit 0). On failure the service stays enabled so the
# operator can retry: `systemctl reset-failed devboost-firstboot && systemctl start devboost-firstboot`
ExecStartPost=/bin/systemctl disable devboost-firstboot.service

[Install]
WantedBy=multi-user.target
UNIT
systemctl enable devboost-firstboot.service
%end
