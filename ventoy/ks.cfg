# ks.cfg — dev-boost zero-touch Fedora 44 Kickstart (design §9.6 + §10c BTRFS layout).
# Fed to the Fedora ISO by Ventoy auto_install. Installs unattended with a snapshot-ready
# BTRFS subvolume layout, then a first-boot oneshot runs `install.sh --profile full`.

text
lang en_US.UTF-8
keyboard us
timezone --utc Etc/UTC
rootpw --lock
firstboot --disable
reboot

# --- Disk / partitioning: §10c BTRFS subvolume layout -------------------------
# Whole-disk, auto-detected; /boot stays INSIDE root (atomic kernel+initramfs snapshots);
# NO swap partition (zram only); compress=zstd:1 on every btrfs mount (custom layouts lack it).
ignoredisk --only-use=sda
clearpart --all --initlabel
bootloader --location=mbr

part /boot/efi --fstype=efi --size=600 --label=ESP
part btrfs.01  --grow --size=1024

btrfs none --label=fedora btrfs.01

# snapper-managed subvolumes
btrfs /        --subvol --name=root  fedora --mkfsoptions="" --fsoptions="compress=zstd:1"
btrfs /home    --subvol --name=home  fedora --fsoptions="compress=zstd:1"

# MANDATORY writable subvolume — without it, booting a read-only snapshot fails at the GDM login.
btrfs /var/lib/gdm        --subvol --name=var-lib-gdm        fedora --fsoptions="compress=zstd:1"

# non-snapshotted high-churn subvolumes
btrfs /opt                --subvol --name=opt                fedora --fsoptions="compress=zstd:1"
btrfs /var/cache          --subvol --name=var-cache          fedora --fsoptions="compress=zstd:1"
btrfs /var/log            --subvol --name=var-log            fedora --fsoptions="compress=zstd:1"
btrfs /var/spool          --subvol --name=var-spool          fedora --fsoptions="compress=zstd:1"
btrfs /var/tmp            --subvol --name=var-tmp            fedora --fsoptions="compress=zstd:1"
btrfs /var/lib/containers --subvol --name=var-lib-containers fedora --fsoptions="compress=zstd:1"
btrfs /var/lib/flatpak    --subvol --name=var-lib-flatpak    fedora --fsoptions="compress=zstd:1"
btrfs /var/lib/libvirt    --subvol --name=var-lib-libvirt    fedora --fsoptions="compress=zstd:1"
# NOTE: no `part swap` / no swap subvolume — zram only (provided by zram-generator).

# --- Minimal package set: the engine's needs; full desktop comes from install.sh -------------
%packages
@^workstation-product-environment
git
python3
jq
%end

# --- First-boot bootstrap: install + enable a self-disabling oneshot ----------------------------
%post --log=/var/log/devboost-ks-post.log
mkdir -p /opt/dev-boost
# (Ventoy injection unpacks dev-boost/ + secrets.age into the installed system; see ventoy.json.)
cat > /etc/systemd/system/devboost-firstboot.service <<'UNIT'
[Unit]
Description=dev-boost first-boot bootstrap (install.sh --profile full)
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/bin/bash -lc '/opt/dev-boost/install.sh --profile full --secrets /opt/dev-boost/secrets.age >> /var/log/devboost-firstboot.log 2>&1; systemctl disable devboost-firstboot.service'

[Install]
WantedBy=multi-user.target
UNIT
systemctl enable devboost-firstboot.service
%end
