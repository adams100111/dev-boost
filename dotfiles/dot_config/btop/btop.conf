#? Config file for btop — dev-boost managed (chezmoi: dotfiles/dot_config/btop/btop.conf).
# Only non-default keys are set; btop fills the rest with its defaults.

# Catppuccin Mocha (shipped in themes/); matches wezterm/bat/starship.
color_theme = "catppuccin_mocha"
theme_background = False
truecolor = True

# Navigation + look.
vim_keys = True
rounded_corners = True
graph_symbol = "braille"

# Boxes and refresh.
shown_boxes = "cpu mem net proc"
update_ms = 2000

# Processes: sort by CPU, flat list, per-process cpu/mem gradient.
proc_sorting = "cpu lazy"
proc_tree = False
proc_gradient = True

# CPU / memory / disks.
cpu_graph_upper = "total"
show_cpu_freq = True
mem_graphs = True
show_swap = True
show_disks = True
show_io_stat = True

# Network auto-scales to the busiest interface.
net_auto = True

# Headless server: no battery meter, 24h clock.
show_battery = False
clock_format = "%X"
