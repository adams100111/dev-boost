# ~/.tmux.conf — dev-boost managed tmux configuration (tmux 3.6+)
# devboost — managed by chezmoi; edit via dotfiles/dot_tmux.conf in the dev-boost repo.
# Reload after editing:  prefix + r   (or: tmux source-file ~/.tmux.conf)

# ─────────────────────────────────────────────────────────────────────────────
# General behaviour
# ─────────────────────────────────────────────────────────────────────────────
set -g mouse on                 # wheel scrolls the pane; drag to resize/select
set -g history-limit 50000      # big scrollback buffer
set -sg escape-time 10          # don't swallow ESC (breaks vim/nvim if too high)
set -g focus-events on          # let apps (vim autoread, etc.) react to focus
set -g display-time 2000        # show status messages for 2s
set -g display-panes-time 2000  # show pane numbers longer (prefix + q)
set -g set-clipboard on         # let programs use the system clipboard (OSC52)
set -g renumber-windows on      # keep window numbers gap-free when one closes
setw -g aggressive-resize on    # resize to the smallest *attached* client only

# Index from 1 (0 is a long reach on the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# ─────────────────────────────────────────────────────────────────────────────
# True color / terminal capabilities
# ─────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:Tc,xterm-*:Tc"  # 24-bit RGB color
set -ag terminal-features  ",*:RGB,*:usstyle,*:clipboard" # RGB + undercurl + OSC52 clipboard (works over SSH)

# ─────────────────────────────────────────────────────────────────────────────
# Key bindings
# ─────────────────────────────────────────────────────────────────────────────
# Prefix stays Ctrl-b. To use Ctrl-a instead, uncomment the next three lines:
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Intuitive splits that keep the current directory  (prefix + | and prefix + -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation  (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing  (prefix then H/J/K/L, hold to repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r C-h previous-window
bind -r C-l next-window

# ─────────────────────────────────────────────────────────────────────────────
# Copy mode — vi keys
# ─────────────────────────────────────────────────────────────────────────────
setw -g mode-keys vi

# Copy via OSC 52 (set-clipboard on + clipboard terminal-feature): tmux forwards the
# selection to the outer terminal's clipboard, so it works BOTH locally and over SSH
# (unlike wl-copy, which only exists on a local Wayland desktop).
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi y                 send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter             send -X copy-selection-and-cancel
# Copy-on-release: finishing a mouse drag copies the selection to the system
# clipboard and keeps it highlighted (no jump to bottom).
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
# Double-click = copy word, triple-click = copy line (to system clipboard).
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-selection-no-clear
# Same gestures when NOT already in copy mode.
bind -T root DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-selection-no-clear
bind -T root TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-selection-no-clear

# Right-click pastes the copy buffer instead of opening tmux's context menu.
bind -T root MouseDown3Pane paste-buffer

# Scroll speed — lines moved per wheel notch (default is 5). Lower = slower.
bind -T copy-mode-vi WheelUpPane   select-pane \; send -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 2 scroll-down

# ─────────────────────────────────────────────────────────────────────────────
# Status bar — clean and minimal
# ─────────────────────────────────────────────────────────────────────────────
set -g status-interval 5
# Bottom, near the prompt — pairs with WezTerm's tabs on top (the default, i.e.
# prefs.show_resource_gauges = false in wezterm/config/prefs.lua). If you enable the
# WezTerm gauges there, its bar moves to the bottom; set this to `top` to match.
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default fg=white"
set -g status-left  "#[fg=black,bg=green,bold] #S #[default] "
set -g status-left-length 30
# RAM/disk gauges (persistent — visible even while a full-screen app fills the pane,
# unlike the shell prompt). Refreshed on status-interval; see config/tmux/resources.sh.
set -g status-right "#(~/.config/tmux/resources.sh)  #[fg=cyan]#H #[fg=yellow]%Y-%m-%d %H:%M "
set -g status-right-length 120
setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-format " #I:#W#F "
set -g pane-active-border-style "fg=cyan"
set -g pane-border-style "fg=brightblack"
set -g message-style "fg=black,bg=yellow"

# ─────────────────────────────────────────────────────────────────────────────
# Plugins — managed by TPM (Tmux Plugin Manager)
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Install plugins: prefix + I
# ─────────────────────────────────────────────────────────────────────────────
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
