name        = "fresh"
category    = "editors"
description = "Install the sinelaw/fresh terminal editor (Fedora rpm → official script → cargo fallback)"
requires    = []
profiles    = ["editors"]
verify      = "command -v fresh"

[install]
default = "bash \"$DEVBOOST_ROOT/modules/fresh/install.sh\""

[fallback]
script = "https://raw.githubusercontent.com/sinelaw/fresh/refs/heads/master/scripts/install.sh"
