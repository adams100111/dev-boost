name        = "chezmoi"
category    = "base"
description = "Install chezmoi dotfile manager; init and clone dotfiles repo (non-blocking)"
requires    = ["secrets"]
profiles    = ["base"]
verify      = "command -v chezmoi >/dev/null 2>&1 && [ -d \"$HOME/.local/share/chezmoi\" ]"

[install]
default = "bash \"$DEVBOOST_ROOT/modules/chezmoi/install.sh\""
