# Supported-OS catalog — pinned ISO URLs + SHA256.
#
# This is the in-repo source of truth for what `devboost usb` can install (Principle III).
# Each sha256 MUST come from the distro's signed CHECKSUM — never invent one.
# Adding a distro or arch = one table below; it appears in the `devboost usb` wizard
# (friendly name) automatically, with zero code changes. The file is validated at load
# (structure + 64-hex sha256), so a malformed pin fails loudly.

