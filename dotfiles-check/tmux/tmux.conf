# tmux configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # C-a C-a sends literal C-a to inner app

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true colour
set -g history-limit 50000
set -g buffer-limit 20
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
set -g set-titles on
set -g set-titles-string "#S  #W"

# ── Indexing ──────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on    # keep window numbers gapless

# ── Responsiveness ────────────────────────────────────────────────────────────
set -s escape-time 0          # no delay for escape key
set -g focus-events on        # pass focus events to apps (vim, etc.)

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Vi mode ───────────────────────────────────────────────────────────────────
set -g mode-keys vi
set -g status-keys vi

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || pbcopy 2>/dev/null || cat"
bind -T copy-mode-vi Escape send -X cancel

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Windows ───────────────────────────────────────────────────────────────────
bind c   new-window -c "#{pane_current_path}"
bind ,   command-prompt -I "#W" "rename-window '%%'"
bind Tab last-window
bind -r [ previous-window
bind -r ] next-window

# move windows left/right
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# ── Panes ─────────────────────────────────────────────────────────────────────
# Split in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (repeatable)
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Zoom toggle
bind z resize-pane -Z

# Swap pane
bind > swap-pane -D
bind < swap-pane -U

# ── Sessions ──────────────────────────────────────────────────────────────────
bind S   command-prompt -p "New session:" "new-session -s '%%'"
bind C-s choose-session
bind X   confirm-before -p "Kill session #S? [y/n]" kill-session

# ── Layouts ───────────────────────────────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ── Copy / paste ──────────────────────────────────────────────────────────────
bind Escape copy-mode
bind p paste-buffer
bind P choose-buffer

# ── Appearance ────────────────────────────────────────────────────────────────
# Catppuccin Mocha palette (manual — no plugin needed)
# bg: #1e1e2e  surface0: #313244  surface1: #45475a
# text: #cdd6f4  subtext: #a6adc8
# lavender: #b4befe  blue: #89b4fa  sapphire: #74c7ec
# green: #a6e3a1  yellow: #f9e2af  peach: #fab387  red: #f38ba8

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colours
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#b4befe,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#b4befe]"

# Right: git branch | host | time
set -g status-right-length 120
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#a6adc8,bg=#45475a] #{?#{!=:#{pane_current_command},bash}, #{pane_current_command} ,}#[fg=#313244,bg=#45475a]#[fg=#89b4fa,bg=#313244]  #H #[fg=#b4befe,bg=#313244]#[fg=#1e1e2e,bg=#b4befe,bold] %H:%M "

# Window tabs
setw -g window-status-style "fg=#a6adc8,bg=#1e1e2e"
setw -g window-status-format " #[fg=#45475a]#I#[fg=#a6adc8] #W "
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I #W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"
setw -g window-status-bell-style    "fg=#f38ba8,bg=#1e1e2e,bold"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-status off

# Message / command bar
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Copy mode highlight
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# ── Nested tmux (SSH) ─────────────────────────────────────────────────────────
# Press F12 to toggle off local prefix so inner tmux gets C-a
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#313244,fg=#a6adc8" \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    refresh-client -S
