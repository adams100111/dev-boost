# Starship developer config
# https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$docker_context\
$aws\
$cmd_duration\
$line_break\
$jobs\
$time\
$status\
$character"""

[fill]
symbol = " "

# ── Directory ──────────────────────────────────────────────────────────────────
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"

# ── Git ────────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
style = "bold red"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
disabled = false

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bold yellow"

# ── Languages ─────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = " "
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]
python_binary = ["python3", "python"]

[rust]
symbol = " "
style = "bold orange"
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
style = "bold cyan"
detect_files = ["go.mod", "go.sum"]

[java]
symbol = " "
style = "bold red"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

# ── Infrastructure ─────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style = "bold blue"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
only_with_files = true

[aws]
symbol = " "
style = "bold yellow"
format = '[$symbol($profile)(\[$duration\])]($style) '
disabled = false

[kubernetes]
symbol = "⎈ "
style = "bold blue"
disabled = false
detect_files = ["k8s", "*.yaml", "*.yml"]

# ── Prompt chrome ─────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "[ $duration]($style) "
style = "bold yellow"
show_milliseconds = false

[time]
disabled = false
format = '[\[$time\]]($style) '
style = "dimmed white"
time_format = "%H:%M"

[status]
disabled = false
format = '[$symbol$status]($style) '
style = "bold red"
symbol = "✗ "
success_symbol = ""
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🔴"

[jobs]
symbol = "⚙"
style = "bold blue"
number_threshold = 1

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── User / Host (only shown over SSH) ─────────────────────────────────────────
[username]
show_always = false
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "bold blue"
format = "[$hostname]($style) "

# ── Package version (show in project roots) ───────────────────────────────────
[package]
symbol = "📦 "
style = "bold dimmed red"
disabled = false
