[profiles]
# `full` — the production workstation aggregate (the default install target).
# Union of the default-on profiles; opt-in/aesthetic/hardware profiles are excluded
# (gnome-aesthetics, gnome-theme, hardware-nvidia, optional-editors, security-cli) and
# the portable subsets terminal/devtools are alternative entry points, not part of full.
full = ["base","cli","shell","gnome","multimedia","editors","python","web","laravel",
        "dotnet","data","devops","react-native","apps","system","dev-hygiene"]
base = ["secrets","ssh-setup","rpmfusion","dnf-tune","fedora-third-party","flatpak",
        "coreutils","git","curl","wget","unzip","jq","htop","ripgrep","fd","fzf","tmux",
        "build-tools","mise","chezmoi","chezmoi-repo","docker"]
cli  = ["eza","bat","btop","zoxide","atuin","direnv","delta","lazygit","lazydocker",
        "dust","duf","sd","yq","gh","tealdeer","tpm","fastfetch","claude-code"]
shell = ["starship","bash-config","wezterm","nerd-fonts","dotfiles","claude-statusline"]
gnome            = ["gnome-settings","gnome-extensions","gnome-manager-apps"]
gnome-aesthetics = ["gnome-aesthetics-bundle"]
gnome-theme      = ["gnome-theme-bundle"]
multimedia       = ["ffmpeg-full","codecs","va-hwaccel","openh264","ffmpeg-ubuntu","codecs-ubuntu"]
editors          = ["vscode","fresh","fresh-lsp"]
python           = ["uv","python-lsp"]
web              = ["web-runtimes","web-lsp"]
laravel          = ["ddev","laravel-lsp"]
dotnet           = ["dotnet-sdk","aspire","dotnet-lsp"]
data             = ["data-services"]
devops           = ["devops-tools","devops-lsp"]
react-native     = ["web-runtimes","android-sdk","expo"]
apps             = ["obsidian","bruno","bitwarden","flameshot","localsend","vlc","obsidian-sync"]
dev-hygiene      = ["aspire-gc"]
system           = ["snapper","snapper-dnf-hook","grub-btrfs","btrfs-assistant","btrfsmaintenance","fwupd","power-profiles-daemon","thermald","smartmontools","dnf-automatic-security","restic-backup","earlyoom","swapfile","gpu-detect"]
hardware-nvidia  = ["nvidia-akmod","cuda","libva-nvidia-driver","secureboot-mok","nvidia-resign-service","nvidia-container-toolkit","nvidia-driver-ubuntu"]
optional-editors = ["neovim","jetbrains-toolbox"]
security-cli     = ["pass","pass-store"]
terminal = ["coreutils","git","curl","wget","unzip","jq","mise","chezmoi",
            "ripgrep","fd","fzf","bat","eza","btop","zoxide","atuin","direnv",
            "delta","lazygit","dust","duf","sd","yq","gh","tealdeer","fastfetch",
            "tmux","fresh","starship","bash-config","dotfiles","wezterm","nerd-fonts",
            "claude-statusline"]
devtools = ["web-runtimes","uv","python-lsp","web-lsp","dotnet-sdk","aspire",
            "dotnet-lsp","ddev"]
