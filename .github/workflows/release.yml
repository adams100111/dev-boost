name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Gate the whole release on the same checks CI runs. ci.yml was red for 20+ runs while
  # releases shipped regardless, because release.yml never ran the tests — it only built the
  # binary. Run them here too, and make everything downstream need them, so a tag can never
  # publish a tree that would fail CI.
  checks:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - run: uv sync
      - run: uv run ruff check
      - run: uv run mypy
      - run: uv run pytest

  binary:
    needs: [checks]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Check tag matches version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject="$(grep -m1 -oP '^version = "\K[^"]+' engine/pyproject.toml)"
          init="$(grep -m1 -oP '^__version__ = "\K[^"]+' engine/src/devboost/__init__.py)"
          echo "tag=${tag}  pyproject=${pyproject}  __version__=${init}"
          if [ "${tag}" != "${pyproject}" ] || [ "${tag}" != "${init}" ]; then
            echo "::error::tag v${tag} must match pyproject (${pyproject}) and __version__ (${init})"
            exit 1
          fi
      - uses: astral-sh/setup-uv@v7
      - name: Build + smoke the frozen binary
        run: bash scripts/build-bundle.sh
      - uses: actions/upload-artifact@v7
        with:
          name: devboost-${{ matrix.arch }}
          path: |
            dist/devboost-${{ matrix.arch }}
            dist/devboost-${{ matrix.arch }}.tar.gz
            dist/checksums-${{ matrix.arch }}.txt

  release:
    needs: [binary]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect assets + checksums
        run: |
          mkdir -p out
          cp artifacts/devboost-x86_64/devboost-x86_64 out/
          cp artifacts/devboost-aarch64/devboost-aarch64 out/
          cp artifacts/devboost-x86_64/devboost-x86_64.tar.gz out/     # Ventoy injection (x86_64)
          cp artifacts/devboost-aarch64/devboost-aarch64.tar.gz out/   # Ventoy injection (aarch64)
          ( cd out && sha256sum devboost-x86_64 devboost-aarch64 \
              devboost-x86_64.tar.gz devboost-aarch64.tar.gz > checksums.txt )
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            out/devboost-x86_64
            out/devboost-aarch64
            out/devboost-x86_64.tar.gz
            out/devboost-aarch64.tar.gz
            out/checksums.txt
